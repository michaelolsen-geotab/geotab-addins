<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<title>Daily Fleet Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --text-primary: #1f2833;
    --text-secondary: #4e677e;
    --text-placeholder: #8da4b9;
    --text-disabled: #c0ccd8;
    --text-reverse: #ffffff;
    --bg-main: #ffffff;
    --bg-content-0: #f9fafb;
    --bg-content-1: #f2f5f7;
    --bg-content-2: #d9e1e8;
    --bg-hover: #e6ebef;
    --bg-brand: #25477b;
    --action-primary: #0078d3;
    --action-primary-hover: #005aa8;
    --border: #c0ccd8;
    --border-active: #0078d3;
    --error-text: #c51a11;
    --error-bg: #fff2f2;
    --error-border: #f7a1a2;
    --font: Roboto, "Segoe UI", Helvetica, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg-content-0);
    padding: 16px;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .toolbar-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    flex: 1;
    letter-spacing: 0.16px;
  }

  .toolbar-label {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.32px;
  }

  input[type="date"] {
    font-family: var(--font);
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg-main);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 8px;
    outline: none;
  }
  input[type="date"]:focus {
    border-color: var(--border-active);
  }

  /* ── Buttons ── */
  .btn {
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 4px;
    border: 1px solid;
    cursor: pointer;
    letter-spacing: 0.16px;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--action-primary);
    border-color: var(--action-primary);
    color: var(--text-reverse);
  }
  .btn-primary:hover { background: var(--action-primary-hover); border-color: var(--action-primary-hover); }

  .btn-secondary {
    background: var(--bg-main);
    border-color: var(--border);
    color: var(--text-primary);
  }
  .btn-secondary:hover { background: var(--bg-hover); }
  .btn-secondary:disabled {
    color: var(--text-disabled);
    border-color: var(--border);
    background: var(--bg-main);
    cursor: default;
  }

  /* ── Status ── */
  #status {
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 0.32px;
    min-width: 140px;
  }

  /* ── Error banner ── */
  #error {
    display: none;
    font-size: 14px;
    color: var(--error-text);
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-radius: 4px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }

  /* ── Card ── */
  .card {
    background: var(--bg-main);
    border-radius: 8px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  #empty {
    padding: 48px;
    text-align: center;
    font-size: 14px;
    color: var(--text-secondary);
  }

  /* ── Table ── */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--bg-brand);
    color: var(--text-reverse);
    padding: 10px 12px;
    text-align: left;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.32px;
    white-space: nowrap;
  }
  thead th:not(:first-child) { text-align: right; }

  tbody tr:nth-child(even) { background: var(--bg-content-0); }
  tbody tr:hover { background: var(--bg-hover); }

  tbody td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--bg-content-1);
    font-size: 14px;
    white-space: nowrap;
  }
  tbody td:not(:first-child) { text-align: right; }

  tfoot td {
    padding: 10px 12px;
    font-weight: 700;
    font-size: 14px;
    border-top: 2px solid var(--bg-brand);
    background: var(--bg-content-1);
    white-space: nowrap;
  }
  tfoot td:not(:first-child) { text-align: right; }

  .na { color: var(--text-placeholder); }
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">Holt Logistics — Daily Fleet Report</span>
  <span class="toolbar-label">Date:</span>
  <input type="date" id="reportDate">
  <button id="runBtn" class="btn btn-primary">Run Report</button>
  <button id="csvBtn" class="btn btn-secondary" disabled>Export CSV</button>
  <span id="status"></span>
</div>

<div id="error"></div>

<div class="card">
  <div id="empty">Select a date and click Run Report.</div>
  <table id="reportTable" style="display:none">
    <thead>
      <tr>
        <th>Asset Name</th>
        <th>Usage Hours</th>
        <th>Miles Traveled</th>
        <th>Fuel Used (gal)</th>
        <th>EV Energy (kWh)</th>
        <th>Fuel+EV / Hour</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
    <tfoot id="tfoot"></tfoot>
  </table>
</div>

<script>
// ─── Add-In entry point ──────────────────────────────────────────────────────
let _api = null;

geotab.addin.holtDailyReport = function (api, state) {
  _api = api;

  return {
    initialize(freshApi, freshState, callback) {
      _api = freshApi;
      const d = new Date();
      d.setDate(d.getDate() - 1);
      document.getElementById("reportDate").valueAsDate = d;
      document.getElementById("runBtn").addEventListener("click", runReport);
      document.getElementById("csvBtn").addEventListener("click", exportCsv);
      callback();
    },
    focus(freshApi, freshState) {
      _api = freshApi;
    },
    blur() {}
  };
};

// ─── Diagnostic IDs ──────────────────────────────────────────────────────────
const DIAG_FUEL_TOTAL = "DiagnosticTotalTripFuelUsedId";
const DIAG_EV_ENERGY  = "DiagnosticTotalEVEnergyId";

const KM_TO_MI = 0.621371;
const L_TO_GAL = 0.264172;

let _tableData = [];

// ─── Main ────────────────────────────────────────────────────────────────────
async function runReport() {
  const dateStr = document.getElementById("reportDate").value;
  if (!dateStr) return;

  setStatus("Loading…");
  setError("");
  showTable(false);
  document.getElementById("csvBtn").disabled = true;
  _tableData = [];

  try {
    const from = new Date(dateStr + "T00:00:00");
    const to   = new Date(dateStr + "T23:59:59.999");

    setStatus("Fetching trips…");
    const [trips, devices] = await Promise.all([
      callApi("Get", {
        typeName: "Trip",
        search: { fromDate: from.toISOString(), toDate: to.toISOString() },
        resultsLimit: 10000
      }),
      callApi("Get", {
        typeName: "Device",
        search: {},
        resultsLimit: 10000
      })
    ]);

    if (!trips.length) {
      setStatus("No trips found for this date.");
      return;
    }

    const deviceNames = {};
    devices.forEach(d => { deviceNames[d.id] = d.name; });

    const byDevice = {};
    trips.forEach(t => {
      const id = t.device.id;
      if (!byDevice[id]) byDevice[id] = [];
      byDevice[id].push(t);
    });

    setStatus("Fetching fuel & energy data…");

    const [fuelData, evData] = await Promise.all([
      getStatusDataDelta(DIAG_FUEL_TOTAL, from, to),
      getStatusDataDelta(DIAG_EV_ENERGY, from, to)
    ]);

    setStatus("Calculating…");

    const rows = Object.keys(byDevice).map(id => {
      const devTrips = byDevice[id].sort((a, b) => new Date(a.start) - new Date(b.start));
      const first = devTrips[0];
      const last  = devTrips[devTrips.length - 1];

      let usageHours;
      const ehDelta = (last.engineHours - first.engineHours) / 3600;
      if (ehDelta > 0 && ehDelta < 24) {
        usageHours = ehDelta;
      } else {
        usageHours = devTrips.reduce((s, t) =>
          s + durationToHours(t.drivingDuration) + durationToHours(t.idlingDuration), 0);
      }

      const miles  = devTrips.reduce((s, t) => s + (t.distance || 0), 0) * KM_TO_MI;
      const fuelGal = fuelData[id] != null ? fuelData[id] * L_TO_GAL : null;
      const kWh     = evData[id]   != null ? evData[id]               : null;

      let perHour = null;
      if (usageHours > 0 && (fuelGal != null || kWh != null)) {
        perHour = ((fuelGal || 0) + (kWh != null ? kWh * 0.033695 : 0)) / usageHours;
      }

      return {
        name: deviceNames[id] || first.device.name || id,
        usageHours,
        miles,
        fuelGal,
        kWh,
        perHour
      };
    });

    rows.sort((a, b) => a.name.localeCompare(b.name));
    _tableData = rows;

    renderTable(rows);
    setStatus(`${rows.length} asset${rows.length !== 1 ? "s" : ""} — ${dateStr}`);
    document.getElementById("csvBtn").disabled = false;

  } catch (err) {
    setError(err.message || String(err));
    setStatus("Error.");
  }
}

// ─── StatusData delta per device ─────────────────────────────────────────────
async function getStatusDataDelta(diagnosticId, from, to) {
  let data;
  try {
    data = await callApi("Get", {
      typeName: "StatusData",
      search: {
        fromDate: from.toISOString(),
        toDate: to.toISOString(),
        diagnosticSearch: { id: diagnosticId }
      },
      resultsLimit: 50000
    });
  } catch (_) {
    return {};
  }

  const byDevice = {};
  data.forEach(sd => {
    const id = sd.device.id;
    if (!byDevice[id]) byDevice[id] = [];
    byDevice[id].push(sd.data);
  });

  const result = {};
  Object.entries(byDevice).forEach(([id, vals]) => {
    const delta = Math.max(...vals) - Math.min(...vals);
    if (delta >= 0) result[id] = delta;
  });
  return result;
}

// ─── Render ──────────────────────────────────────────────────────────────────
function renderTable(rows) {
  const tbody = document.getElementById("tbody");
  const tfoot = document.getElementById("tfoot");
  tbody.innerHTML = "";

  let totHours = 0, totMiles = 0, totFuel = 0, totKwh = 0;
  let hasFuel = false, hasKwh = false;

  rows.forEach(r => {
    totHours += r.usageHours || 0;
    totMiles += r.miles || 0;
    if (r.fuelGal != null) { totFuel += r.fuelGal; hasFuel = true; }
    if (r.kWh     != null) { totKwh  += r.kWh;     hasKwh  = true; }

    tbody.insertAdjacentHTML("beforeend", `<tr>
      <td>${escHtml(r.name)}</td>
      <td>${fmt(r.usageHours, 2)}</td>
      <td>${fmt(r.miles, 1)}</td>
      <td>${r.fuelGal != null ? fmt(r.fuelGal, 2) : '<span class="na">—</span>'}</td>
      <td>${r.kWh     != null ? fmt(r.kWh, 2)     : '<span class="na">—</span>'}</td>
      <td>${r.perHour != null ? fmt(r.perHour, 3) + " gal-eq/hr" : '<span class="na">—</span>'}</td>
    </tr>`);
  });

  const totPerHour = totHours > 0 && (hasFuel || hasKwh)
    ? fmt((totFuel + totKwh * 0.033695) / totHours, 3) + " gal-eq/hr"
    : '<span class="na">—</span>';

  tfoot.innerHTML = `<tr>
    <td>TOTAL (${rows.length} assets)</td>
    <td>${fmt(totHours, 2)}</td>
    <td>${fmt(totMiles, 1)}</td>
    <td>${hasFuel ? fmt(totFuel, 2) : '<span class="na">—</span>'}</td>
    <td>${hasKwh  ? fmt(totKwh, 2)  : '<span class="na">—</span>'}</td>
    <td>${totPerHour}</td>
  </tr>`;

  showTable(true);
}

// ─── CSV export ──────────────────────────────────────────────────────────────
function exportCsv() {
  const dateStr = document.getElementById("reportDate").value;
  const header = ["Asset Name","Usage Hours","Miles Traveled","Fuel Used (gal)","EV Energy (kWh)","Fuel+EV per Hour (gal-eq)"];
  const lines = [header.join(",")];

  _tableData.forEach(r => {
    lines.push([
      `"${r.name.replace(/"/g,'""')}"`,
      fmtCsv(r.usageHours, 2),
      fmtCsv(r.miles, 1),
      r.fuelGal != null ? fmtCsv(r.fuelGal, 2) : "",
      r.kWh     != null ? fmtCsv(r.kWh, 2)     : "",
      r.perHour != null ? fmtCsv(r.perHour, 3)  : ""
    ].join(","));
  });

  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `holt-fleet-report-${dateStr}.csv`;
  a.click();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function callApi(method, params) {
  return new Promise((resolve, reject) => {
    const result = _api.call(method, params, resolve, reject);
    if (result && typeof result.then === "function") {
      result.then(resolve).catch(reject);
    }
  });
}

function durationToHours(d) {
  if (!d) return 0;
  if (typeof d === "number") return d * 24;
  const parts = String(d).split(":");
  if (parts.length === 3) {
    return parseInt(parts[0]) + parseInt(parts[1]) / 60 + parseFloat(parts[2]) / 3600;
  }
  return 0;
}

function fmt(n, dp) { return (n || 0).toFixed(dp); }
function fmtCsv(n, dp) { return fmt(n, dp); }
function escHtml(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
function showTable(v) {
  document.getElementById("reportTable").style.display = v ? "" : "none";
  document.getElementById("empty").style.display      = v ? "none" : "";
}
function setStatus(msg) { document.getElementById("status").textContent = msg; }
function setError(msg) {
  const el = document.getElementById("error");
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}
</script>
</body>
</html>
